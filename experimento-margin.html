<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Margin Collapse</title>
  <style>   
    .elemento {
      background: #D5E8F0;
      padding: 20px;
    }

    .elemento-1 {
      margin-bottom: 40px;
    }

    .elemento-2 {
      margin-top: 60px;
    }
  </style>
</head>

<body>

  <div class="elemento elemento-1">
    Elemento 1 (margin-bottom: 40px)
  </div>

  <div class="elemento elemento-2">
    Elemento 2 (margin-top: 60px)
  </div>

</body>
</html>
